name: panel quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  lint-and-test:
    name: lint + vitest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        # 用 npm install（不用 npm ci）绕过 npm bug #4828：
        # vitest 4 的 rolldown native binding 是 optionalDependencies，
        # 在 macOS 生成的 lock 不会强制列入 linux-x64-gnu binding，
        # CI 上 npm ci 严格按 lock 拉就会找不到 native module。
        # npm install 允许在 CI 上按平台重新解析 optional deps。
        run: npm install --no-audit --no-fund

      - name: ESLint (baseline mode - hard error blocks merge)
        run: |
          npx eslint . -f json -o eslint-report.json || true
          node scripts/eslint-baseline-check.js

      - name: Vitest run (adapter mock harness)
        run: npx vitest run --reporter=verbose
        timeout-minutes: 5

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ matrix.os }}
          path: eslint-report.json
          retention-days: 14

  done:
    name: all green
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - run: echo "All quality gates passed."
