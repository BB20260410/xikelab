name: panel quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'

jobs:
  lint-and-test:
    name: lint + vitest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        # 修复 npm #4828：在 root package.json 的 optionalDependencies
        # 显式列出 rolldown 跨平台 binding（linux-x64-gnu / darwin-arm64
        # / darwin-x64 / win32-x64-msvc），让 lockfile 含全平台 metadata。
        # npm ci --include=optional 能基于固定 lock 在任意 CI host 装上
        # 对应平台的 binding，且不会因装不上其他平台的 binding 而 fatal。
        run: npm ci --include=optional --no-audit --no-fund

      - name: ESLint (baseline mode - hard error blocks merge)
        run: |
          npx eslint . -f json -o eslint-report.json || true
          node scripts/eslint-baseline-check.js

      - name: Vitest run (adapter mock harness)
        run: npx vitest run --reporter=verbose
        timeout-minutes: 5

      - name: npm audit (production dependencies)
        run: npm audit --registry=https://registry.npmjs.org --omit=dev --audit-level=moderate
        timeout-minutes: 3

      - name: Panel e2e + perf observation (non-blocking)
        continue-on-error: true
        timeout-minutes: 7
        run: |
          set -euo pipefail
          PANEL_URL="http://127.0.0.1:51735"
          PANEL_LOG="${RUNNER_TEMP}/xikelab-panel.log"
          VERSION_JSON="${RUNNER_TEMP}/xikelab-version.json"

          PANEL_NO_OPEN=1 PORT=51735 npm start > "${PANEL_LOG}" 2>&1 &
          PANEL_PID=$!
          echo "${PANEL_PID}" > "${RUNNER_TEMP}/xikelab-panel.pid"

          cleanup() {
            kill "${PANEL_PID}" 2>/dev/null || true
            wait "${PANEL_PID}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for _ in $(seq 1 45); do
            if curl -fsS "${PANEL_URL}/api/version" > "${VERSION_JSON}"; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "${ready}" != "1" ]; then
            echo "panel did not become ready"
            tail -200 "${PANEL_LOG}" || true
            exit 1
          fi

          cat "${VERSION_JSON}"
          PANEL_URL="${PANEL_URL}" npm run test:e2e
          PANEL_URL="${PANEL_URL}" npm run perf-check

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ matrix.os }}
          path: |
            eslint-report.json
            ${{ runner.temp }}/xikelab-panel.log
            output/playwright/
          retention-days: 14

  done:
    name: all green
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - run: echo "All quality gates passed."
