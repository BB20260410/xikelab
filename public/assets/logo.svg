<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hangora Logo — 设计说明：
    - 中心字母 H：用户姓 Hang 首字母
    - 4 个外围圆点：4 房 AI 协作模式（chat / debate / squad / arena）围坐
    - 整体呈圆形构图：「agora 集会场所」隐喻
    - 单色 monoline，可适配 dark / light 主题
  作者：hxx
  License：私有
  与 Anthropic / Claude / OpenAI / 任何已知品牌无视觉重合
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- 外圆（roundtable / agora 集会圈）-->
  <circle cx="128" cy="128" r="112" stroke="currentColor" stroke-width="8" fill="none" opacity="0.3"/>

  <!-- 4 个 AI 节点（围坐多 AI）-->
  <circle cx="128" cy="32"  r="14" fill="currentColor"/>
  <circle cx="224" cy="128" r="14" fill="currentColor"/>
  <circle cx="128" cy="224" r="14" fill="currentColor"/>
  <circle cx="32"  cy="128" r="14" fill="currentColor"/>

  <!-- 节点到中心 H 的连线（多 AI 协作连接）-->
  <line x1="128" y1="46"  x2="128" y2="100" stroke="currentColor" stroke-width="4" opacity="0.4"/>
  <line x1="210" y1="128" x2="160" y2="128" stroke="currentColor" stroke-width="4" opacity="0.4"/>
  <line x1="128" y1="210" x2="128" y2="156" stroke="currentColor" stroke-width="4" opacity="0.4"/>
  <line x1="46"  y1="128" x2="96"  y2="128" stroke="currentColor" stroke-width="4" opacity="0.4"/>

  <!-- 中心字母 H（Hang）-->
  <g stroke="currentColor" stroke-width="14" stroke-linecap="round">
    <line x1="96"  y1="96" x2="96"  y2="160"/>
    <line x1="160" y1="96" x2="160" y2="160"/>
    <line x1="96"  y1="128" x2="160" y2="128"/>
  </g>
</svg>
